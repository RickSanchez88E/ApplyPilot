name: Docker CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Typecheck
        run: pnpm run typecheck

      - name: Backend tests
        run: |
          npx playwright install --with-deps chromium
          pnpm run test

      - name: P0 Lifecycle Integration Tests
        run: pnpm tsx scripts/verify-page-lifecycle.ts

      - name: Frontend lint
        run: npm run lint --prefix frontend

      - name: Frontend build
        run: npm run build --prefix frontend

      - name: Docker build (api image smoke check)
        run: docker build -f Dockerfile.api -t job-scraper-api:${{ github.sha }} .

  deploy:
    name: Deploy To Docker Host
    needs: ci
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      secrets.DEPLOY_HOST != '' &&
      secrets.DEPLOY_USER != '' &&
      secrets.DEPLOY_SSH_KEY != '' &&
      secrets.DEPLOY_PATH != ''
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            bash scripts/deploy-api-stable.sh
