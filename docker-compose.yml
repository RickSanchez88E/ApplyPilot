services:
  postgres:
    image: postgres:16-alpine
    container_name: job-scraper-db
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: job_orchestrator
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d job_orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: job-scraper-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/job_orchestrator
      JOOBLE_DESC_MINIMAL_BANDWIDTH: "1"
      CHROME_NO_SANDBOX: "1"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
