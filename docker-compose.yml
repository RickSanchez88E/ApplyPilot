services:
  # ── Data layer ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: job-postgres
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: job_orchestrator
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d job_orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: job-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Application layer ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: job-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/job_orchestrator
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job-scheduler
    command: ["node", "dist/scheduler/index.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/job_orchestrator
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-general:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job-worker-general
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/job_orchestrator
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 2.0

  worker-browser:
    build:
      context: .
      dockerfile: Dockerfile.browser
    container_name: job-worker-browser
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/job_orchestrator
      REDIS_URL: redis://redis:6379
      CHROME_NO_SANDBOX: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0

volumes:
  pgdata:
  redisdata:
